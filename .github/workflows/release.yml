name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npx vite build

      - name: Build + publish (unsigned)
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Auto-fill a "What's Changed" changelog from the commits since the last tag,
      # so every release is labelled (our commits are prefixed feat:/fix:/perf:/docs:).
      # `gh release edit` has no --generate-notes; use the generate-notes API then set it.
      - name: Generate release notes
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" --jq '.body' > /tmp/notes.md
          gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bump the Homebrew cask in Artim-Nayas/homebrew-tap to this version + sha256.
      # No-ops until a HOMEBREW_TAP_TOKEN secret (a PAT with `contents:write` on the
      # tap repo) is added — see "Releasing" in the README.
      - name: Bump Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        if: ${{ env.TAP_TOKEN != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="Git-Menu-${VERSION}-arm64.dmg"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG}"
          SHA="$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Artim-Nayas/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s|^  version \".*\"|  version \"${VERSION}\"|" Casks/git-menu.rb
          sed -i '' -E "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" Casks/git-menu.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Update git-menu to ${VERSION}" && git push

<svg width="400" height="624" viewBox="0 0 400 624" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23242b"/>
      <stop offset="1" stop-color="#191a1f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="8" y="8" width="384" height="608" rx="16" fill="url(#bg)" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>

  <!-- Segmented control -->
  <rect x="20" y="22" width="360" height="40" rx="9" fill="rgba(0,0,0,0.28)"/>
  <rect x="22" y="24" width="88" height="36" rx="7" fill="rgba(255,255,255,0.14)"/>
  <text x="66" y="46" font-size="14" font-weight="600" fill="#ECECEC" text-anchor="middle">Mine</text>
  <text x="156" y="46" font-size="14" fill="#9B9B9B" text-anchor="middle">Reviews</text>
  <text x="246" y="46" font-size="14" fill="#9B9B9B" text-anchor="middle">Inbox</text>
  <text x="336" y="46" font-size="14" fill="#9B9B9B" text-anchor="middle">Actions</text>

  <!-- Contribution panel -->
  <!-- ring -->
  <circle cx="62" cy="128" r="28" fill="none" stroke="#2c2d34" stroke-width="5"/>
  <path d="M 62 100 A 28 28 0 0 1 86.2 142" fill="none" stroke="#2da44e" stroke-width="5" stroke-linecap="round"/>
  <text x="62" y="129" font-size="19" font-weight="700" fill="#ECECEC" text-anchor="middle">4</text>
  <text x="62" y="143" font-size="9" fill="#9B9B9B" text-anchor="middle">today</text>
  <!-- stats -->
  <text x="118" y="106" font-size="13" fill="#9B9B9B">Current streak</text>
  <text x="372" y="106" font-size="13" font-weight="600" fill="#f0883e" text-anchor="end">🔥 4 days</text>
  <text x="118" y="128" font-size="13" fill="#9B9B9B">This week</text>
  <text x="372" y="128" font-size="13" fill="#ECECEC" text-anchor="end">123</text>
  <text x="118" y="150" font-size="13" fill="#9B9B9B">Best day</text>
  <text x="372" y="150" font-size="13" fill="#ECECEC" text-anchor="end">91</text>
  <text x="118" y="172" font-size="13" fill="#9B9B9B">This year</text>
  <text x="372" y="172" font-size="13" fill="#ECECEC" text-anchor="end">2950</text>

  <line x1="20" y1="192" x2="380" y2="192" stroke="rgba(255,255,255,0.08)"/>

  <!-- Heatmap row -->
  <text x="28" y="218" font-size="13" fill="#6e7681">›</text>
  <text x="44" y="218" font-size="13" fill="#9B9B9B">Heatmap</text>
  <rect x="288" y="204" width="92" height="26" rx="6" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.08)"/>
  <text x="300" y="221" font-size="12" fill="#ECECEC">Last 1 year</text>
  <text x="368" y="221" font-size="10" fill="#9B9B9B">⌄</text>

  <line x1="20" y1="244" x2="380" y2="244" stroke="rgba(255,255,255,0.08)"/>

  <!-- Search -->
  <rect x="20" y="258" width="360" height="38" rx="9" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.08)"/>
  <text x="34" y="282" font-size="13" fill="#6e7681">Search PRs, repos…</text>

  <!-- Filter chips -->
  <g font-size="12">
    <rect x="20" y="308" width="44" height="26" rx="13" fill="#2da44e"/>
    <text x="42" y="325" fill="#ffffff" text-anchor="middle" font-weight="600">All</text>
    <rect x="70" y="308" width="78" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="109" y="325" fill="#9B9B9B" text-anchor="middle">⚠ Failing</text>
    <rect x="154" y="308" width="76" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="192" y="325" fill="#9B9B9B" text-anchor="middle">👀 Review</text>
    <rect x="236" y="308" width="86" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="279" y="325" fill="#9B9B9B" text-anchor="middle">✓ Approved</text>
    <rect x="328" y="308" width="52" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="354" y="325" fill="#9B9B9B" text-anchor="middle">Draft</text>
  </g>

  <!-- Org header -->
  <rect x="8" y="348" width="384" height="34" fill="rgba(0,0,0,0.22)"/>
  <text x="20" y="370" font-size="13" font-weight="700" fill="#ECECEC">getsimplifin/billing-management-service</text>
  <rect x="356" y="355" width="24" height="20" rx="10" fill="rgba(255,255,255,0.1)"/>
  <text x="368" y="369" font-size="11" fill="#ECECEC" text-anchor="middle">5</text>

  <!-- PR row 1 -->
  <circle cx="30" cy="410" r="5" fill="#2da44e"/>
  <text x="46" y="406" font-size="14" font-weight="600" fill="#ECECEC">Fix internal charge composite <tspan fill="#6e7681" font-weight="400">#2737</tspan></text>
  <text x="46" y="424" font-size="11.5" fill="#9B9B9B">fix/internal-charge-composite-only · ✓ approved · 2d ago</text>
  <text x="372" y="412" font-size="13" fill="#6e7681" text-anchor="end">›</text>
  <line x1="20" y1="442" x2="380" y2="442" stroke="rgba(255,255,255,0.06)"/>

  <!-- PR row 2 -->
  <circle cx="30" cy="470" r="5" fill="#d29922"/>
  <text x="46" y="466" font-size="14" font-weight="600" fill="#ECECEC">Add staging release pipeline <tspan fill="#6e7681" font-weight="400">#2736</tspan></text>
  <text x="46" y="484" font-size="11.5" fill="#9B9B9B">staging-release-02-06 · ● checks running · 5h ago</text>
  <text x="372" y="472" font-size="13" fill="#6e7681" text-anchor="end">›</text>
  <line x1="20" y1="502" x2="380" y2="502" stroke="rgba(255,255,255,0.06)"/>

  <!-- PR row 3 -->
  <circle cx="30" cy="530" r="5" fill="#cf222e"/>
  <text x="46" y="526" font-size="14" font-weight="600" fill="#ECECEC">Refactor recon batch job <tspan fill="#6e7681" font-weight="400">#2701</tspan></text>
  <text x="46" y="544" font-size="11.5" fill="#9B9B9B">recon/batch-refactor · ⚠ 2 checks failing · 1d ago</text>
  <text x="372" y="532" font-size="13" fill="#6e7681" text-anchor="end">›</text>

  <!-- Footer -->
  <line x1="8" y1="572" x2="392" y2="572" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="48" cy="594" r="9" fill="none" stroke="#9B9B9B" stroke-width="1.5"/>
  <circle cx="48" cy="594" r="2.5" fill="#9B9B9B"/>
  <path d="M196 588 a6 6 0 1 0 6 6 M196 588 v5 h5" fill="none" stroke="#9B9B9B" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M352 588 v6 M348 590 a6 6 0 1 0 8 0" fill="none" stroke="#9B9B9B" stroke-width="1.5" stroke-linecap="round"/>
</svg>
